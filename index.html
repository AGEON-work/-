<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXOPROXYL · 협업 보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root {
  --bg: #fafafa; --bg-2: #f4f4f3; --paper: #ffffff; --paper-soft: #fcfcfb;
  --ink: #1a1a1a; --ink-2: #4a4a48; --ink-3: #7a7a76; --ink-4: #b0b0ac;
  --line: #ececea; --line-2: #d8d8d4; --line-3: #b8b8b3;
  --accent-soft: #2c2c2a;
  --c-purple-bg: #efeafd; --c-purple-ink: #5a4ba8;
  --c-coral-bg: #fde2d7; --c-coral-ink: #b35d36;
  --c-teal-bg: #d8efe7; --c-teal-ink: #2d7a64;
  --c-blue-bg: #dde9f6; --c-blue-ink: #3567a4;
  --c-pink-bg: #fbdde5; --c-pink-ink: #b04568;
  --c-amber-bg: #fde9c8; --c-amber-ink: #9a6a14;
  --c-green-bg: #dde9c8; --c-green-ink: #527a1a;
  --c-red-bg: #fcdcdc; --c-red-ink: #b04444;
  --cat-priority: #fff5e6; --cat-priority-line: #f0c87a; --cat-priority-ink: #8a5a0e;
  --cat-progress: #e9f0fa; --cat-progress-line: #a8c4ea; --cat-progress-ink: #2a5990;
  --cat-done: #e8f0e0; --cat-done-line: #b4cf90; --cat-done-ink: #406318;
  --sans: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
  --r-xs: 4px; --r-sm: 8px; --r: 12px; --r-lg: 16px; --r-xl: 24px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-sm: 0 2px 6px rgba(0,0,0,0.05);
  --shadow: 0 6px 20px rgba(0,0,0,0.07);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button {
  background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-sm);
  padding: 8px 14px; cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; white-space: nowrap;
}
button:hover { background: var(--bg-2); border-color: var(--line-3); }
button:active { transform: translateY(1px); }
button.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
button.primary:hover { background: #2c2c2a; border-color: #2c2c2a; }
button.danger-confirm { background: var(--c-red-ink); color: var(--paper); border-color: var(--c-red-ink); font-weight: 700; }
button.danger-confirm:hover { background: #8a0e0e; border-color: #8a0e0e; }
button.ghost { background: transparent; border-color: transparent; }
button.ghost:hover { background: var(--bg-2); border-color: transparent; }
button.icon { padding: 8px; }
button.sm { padding: 6px 12px; font-size: 12px; }
button.tiny { padding: 4px 10px; font-size: 11px; gap: 4px; }
input[type="text"], input[type="email"], input[type="date"], select, textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--line-2);
  border-radius: var(--r-sm); background: var(--paper); font-size: 14px; font-family: inherit;
  transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.06);
}
::placeholder { color: var(--ink-4); }

/* SYNC STATUS BAR */
.sync-bar {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 100px;
  font-size: 11px; color: var(--ink-3); font-weight: 500;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-bar.online .sync-dot { background: #22a06b; box-shadow: 0 0 0 3px rgba(34, 160, 107, 0.15); }
.sync-bar.offline .sync-dot { background: var(--ink-4); }
.sync-bar.syncing .sync-dot { background: #f0a040; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* LOGIN */
.login-stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%); }
.login-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 48px 40px; max-width: 440px; width: 100%; box-shadow: var(--shadow); }
.login-mark { font-size: 11px; font-weight: 700; letter-spacing: 0.4em; color: var(--ink-3); margin-bottom: 16px; }
.login-headline { font-size: 28px; font-weight: 700; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 12px; }
.login-subtitle { font-size: 14px; color: var(--ink-3); margin-bottom: 32px; line-height: 1.6; }
.domain-notice {
  background: var(--c-amber-bg); color: var(--c-amber-ink); padding: 10px 14px;
  border-radius: var(--r-sm); font-size: 12px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px; line-height: 1.5;
}
.domain-notice strong { font-weight: 700; }
.google-btn { width: 100%; padding: 13px 20px; border-radius: var(--r-sm); background: var(--paper); border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; color: var(--ink); cursor: pointer; transition: all 0.15s; }
.google-btn:hover { border-color: var(--ink); background: var(--bg-2); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.login-divider { display: flex; align-items: center; gap: 14px; margin: 28px 0 20px; color: var(--ink-4); font-size: 11px; letter-spacing: 0.1em; }
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.demo-section { background: var(--paper-soft); border: 1px solid var(--line); border-radius: var(--r); padding: 16px; }
.demo-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--ink-3); margin-bottom: 10px; }
.demo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.demo-pick { padding: 9px 11px; background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: all 0.12s; text-align: left; }
.demo-pick:hover { border-color: var(--ink); background: var(--bg-2); }
.login-foot { display: flex; justify-content: center; gap: 14px; margin-top: 20px; font-size: 11px; color: var(--ink-4); }
.login-foot button { background: transparent; border: none; padding: 0; font-size: 11px; color: var(--ink-3); text-decoration: underline; cursor: pointer; }
.login-error { background: var(--c-red-bg); color: var(--c-red-ink); padding: 12px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }

/* APP SHELL */
.shell { max-width: 1440px; margin: 0 auto; padding: 20px 32px 80px; }
@media (max-width: 768px) { .shell { padding: 16px 16px 60px; } }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; margin-bottom: 28px; border-bottom: 1px solid var(--line); gap: 16px; flex-wrap: wrap; }
.brand-lockup { display: flex; align-items: center; gap: 10px; }
.brand-mark { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.brand-divider { width: 1px; height: 16px; background: var(--line-2); }
.brand-sub { font-size: 12px; color: var(--ink-3); font-weight: 500; }

/* NAV TABS */
.nav-tabs { display: flex; gap: 4px; margin-bottom: 28px; padding-bottom: 0; border-bottom: 1px solid var(--line); }
.nav-tab {
  padding: 10px 18px; background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--ink-3);
  margin-bottom: -1px; display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--ink); background: transparent; }
.nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.nav-tab .badge {
  background: var(--bg-2); color: var(--ink-3); font-size: 11px; padding: 1px 8px;
  border-radius: 100px; font-weight: 700;
}
.nav-tab.active .badge { background: var(--ink); color: var(--paper); }

.user-bar { display: flex; align-items: center; gap: 6px; }
.user-pill { display: flex; align-items: center; gap: 8px; padding: 4px 14px 4px 4px; background: var(--paper); border: 1px solid var(--line); border-radius: 100px; }
.user-pill-info { display: flex; flex-direction: column; line-height: 1.15; }
.user-pill-name { font-size: 13px; font-weight: 700; }
.user-pill-role { font-size: 10px; color: var(--ink-3); }

.logout-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-size: 12px; font-weight: 600;
  background: var(--paper); border: 1px solid var(--line-2);
  border-radius: 100px; color: var(--ink-2); cursor: pointer;
  transition: all 0.15s;
}
.logout-btn:hover {
  background: var(--c-red-ink); color: var(--paper);
  border-color: var(--c-red-ink);
}
.logout-btn svg { display: block; }

.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 12px; background: var(--paper); border: 1px solid var(--line-2); border-radius: 100px; font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer; margin-bottom: 24px; transition: all 0.15s; }
.back-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.back-btn i { font-size: 16px; }

.av { display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 700; flex-shrink: 0; user-select: none; }
.av-img { display: inline-block; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

.greet-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
.greet-meta { font-size: 11px; letter-spacing: 0.1em; color: var(--ink-3); font-weight: 600; margin-bottom: 8px; }
.greet-title { font-size: 32px; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }

.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
@media (max-width: 720px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
.stat { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 18px 20px; cursor: pointer; transition: all 0.15s; }
.stat:hover { border-color: var(--line-3); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.stat.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.stat.active .stat-l { color: rgba(255,255,255,0.7); }
.stat.urgent { background: var(--c-amber-bg); border-color: var(--c-amber-ink); }
.stat.urgent .stat-l, .stat.urgent .stat-v { color: var(--c-amber-ink); }
.stat-l { font-size: 11px; letter-spacing: 0.05em; color: var(--ink-3); font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.stat-v { font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }

.filter-panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 18px 22px; margin-bottom: 32px; }
.filter-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.filter-h { font-size: 14px; font-weight: 700; }
.filter-h em { font-style: normal; color: var(--ink-3); font-weight: 500; }
.filter-list { display: flex; flex-direction: column; gap: 4px; }
.filter-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--paper-soft); border: 1px solid var(--line); border-radius: var(--r-sm); cursor: pointer; transition: all 0.12s; }
.filter-item:hover { border-color: var(--line-3); background: var(--bg-2); }
.filter-item-text { flex: 1; min-width: 0; }
.filter-item-title { font-size: 13px; font-weight: 600; }
.filter-item-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

.sec-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
.sec-title { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; }
.sec-title .count { font-size: 14px; color: var(--ink-3); margin-left: 8px; font-weight: 500; }

.cat-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
@media (max-width: 900px) { .cat-board { grid-template-columns: 1fr; } }
.cat-col { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; min-height: 240px; transition: all 0.15s; }
.cat-col.cat-priority { background: var(--cat-priority); border-color: var(--cat-priority-line); }
.cat-col.cat-progress { background: var(--cat-progress); border-color: var(--cat-progress-line); }
.cat-col.cat-done { background: var(--cat-done); border-color: var(--cat-done-line); }
.cat-col.drag-over { background: var(--ink); border-color: var(--ink); }
.cat-col.drag-over .cat-head .cat-title, .cat-col.drag-over .cat-head .cat-count, .cat-col.drag-over .cat-empty { color: var(--paper); }
.cat-col.drag-over .cat-empty { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
.cat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
.cat-title { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
.cat-priority .cat-title { color: var(--cat-priority-ink); }
.cat-progress .cat-title { color: var(--cat-progress-ink); }
.cat-done .cat-title { color: var(--cat-done-ink); }
.cat-count { font-size: 12px; font-weight: 600; padding: 1px 8px; border-radius: 100px; background: rgba(0,0,0,0.06); }
.cat-priority .cat-count { color: var(--cat-priority-ink); }
.cat-progress .cat-count { color: var(--cat-progress-ink); }
.cat-done .cat-count { color: var(--cat-done-ink); }
.cat-list { display: flex; flex-direction: column; gap: 10px; min-height: 80px; }
.cat-empty { border: 1.5px dashed rgba(0,0,0,0.12); border-radius: var(--r-sm); padding: 24px 16px; text-align: center; font-size: 12px; color: var(--ink-3); background: rgba(255,255,255,0.4); font-weight: 500; pointer-events: none; }

.proj-mini { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 14px 16px; cursor: grab; transition: all 0.15s; user-select: none; position: relative; }
.proj-mini:hover { border-color: var(--ink); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.proj-mini:active { cursor: grabbing; }
.proj-mini.dragging { opacity: 0.4; transform: scale(0.98); cursor: grabbing; }
.proj-mini-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.proj-mini-name { font-size: 14px; font-weight: 700; line-height: 1.35; flex: 1; }
.proj-mini-handle { color: var(--ink-4); font-size: 14px; cursor: grab; }
.proj-mini-desc { font-size: 12px; color: var(--ink-3); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.proj-mini-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--ink-3); margin-bottom: 10px; flex-wrap: wrap; }
.proj-mini-meta-i { display: inline-flex; align-items: center; gap: 4px; }
.proj-mini-meta-i i { font-size: 12px; }
.proj-mini-bar { height: 3px; background: var(--bg-2); border-radius: 100px; overflow: hidden; margin-bottom: 10px; }
.proj-mini-bar-fill { height: 100%; background: var(--ink); border-radius: 100px; transition: width 0.4s; }
.proj-mini-foot { display: flex; align-items: center; justify-content: space-between; }
.proj-mini-progress { font-size: 11px; color: var(--ink-3); font-weight: 600; }
.archive-countdown {
  font-size: 10px; color: var(--cat-done-ink); background: rgba(64, 99, 24, 0.1);
  padding: 2px 8px; border-radius: 100px; font-weight: 600; display: inline-flex; align-items: center; gap: 3px;
}

.review-flag { background: var(--c-amber-bg); color: var(--c-amber-ink); padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }

.av-stack { display: flex; align-items: center; }
.av-stack .av, .av-stack .av-img { border: 2px solid var(--paper); margin-left: -6px; }
.av-stack > :first-child { margin-left: 0; }
.av-stack-extra { font-size: 10px; color: var(--ink-3); margin-left: 6px; font-weight: 600; }

/* ARCHIVE PAGE */
.archive-intro { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 20px 24px; margin-bottom: 28px; }
.archive-intro-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.archive-intro-desc { font-size: 13px; color: var(--ink-3); line-height: 1.6; }

.week-section { margin-bottom: 32px; }
.week-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--ink);
}
.week-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.week-range { font-size: 12px; color: var(--ink-3); font-weight: 500; margin-left: 8px; }
.week-count { font-size: 12px; color: var(--ink-3); font-weight: 600; padding: 2px 10px; background: var(--bg-2); border-radius: 100px; }

.archive-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.archive-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 16px 18px; transition: all 0.15s; cursor: pointer; }
.archive-card:hover { border-color: var(--ink); box-shadow: var(--shadow-sm); }
.archive-card-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.archive-card-desc { font-size: 12px; color: var(--ink-3); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.archive-card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--ink-3); }
.archive-card-completed { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; color: var(--cat-done-ink); }
.archive-empty { text-align: center; padding: 60px 20px; color: var(--ink-4); background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); }
.archive-empty i { font-size: 32px; margin-bottom: 12px; display: block; color: var(--ink-4); }
.archive-empty-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--ink-3); }
.archive-empty-desc { font-size: 12px; color: var(--ink-4); }

/* DETAIL */
.detail-anim { animation: detailIn 0.3s ease; }
@keyframes detailIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.detail-head { margin-bottom: 32px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
.detail-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 10px; }
.detail-desc { font-size: 14px; color: var(--ink-2); margin-bottom: 16px; max-width: 720px; line-height: 1.6; }
.detail-meta { display: flex; gap: 20px; font-size: 12px; color: var(--ink-3); flex-wrap: wrap; align-items: center; }
.detail-meta-i { display: inline-flex; align-items: center; gap: 5px; }
.detail-meta-i i { font-size: 14px; }

.kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
.col { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 20px; min-width: 0; }
.col-head { display: flex; align-items: center; justify-content: space-between; padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid var(--line); flex-wrap: wrap; gap: 12px; }
.col-head-main { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.dept-icon { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--r-sm); font-size: 18px; }
.dept-name-block { display: inline-flex; align-items: center; gap: 8px; }
.dept-name { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.dept-count { font-size: 12px; font-weight: 600; color: var(--ink-3); background: var(--bg-2); padding: 1px 10px; border-radius: 100px; min-width: 24px; text-align: center; }
.role-pill { display: inline-flex; align-items: center; gap: 8px; padding: 4px 4px 4px 14px; background: var(--paper-soft); border: 1px solid var(--line); border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink-2); }
.role-pill-l { font-weight: 700; color: var(--ink-3); font-size: 11px; }
.role-pill-name { font-size: 12px; font-weight: 700; color: var(--ink); margin-left: 2px; margin-right: 4px; }
.role-pill-empty { color: var(--ink-4); font-size: 11px; margin-right: 4px; }

.task-list { display: flex; flex-direction: column; gap: 10px; }
.empty-state { text-align: center; padding: 32px 0; font-size: 12px; color: var(--ink-4); font-weight: 500; }
.empty-state-box {
  text-align: center; padding: 32px 16px;
  border: 1.5px dashed var(--line-2); border-radius: var(--r-sm);

<script>
const STATUS = {
  todo: { label: '대기', cls: 's-todo' },
  progress: { label: '진행중', cls: 's-progress' },
  done: { label: '완료', cls: 's-done' }
};
const DEPTS = {

  marketing: { label: '마케팅', icon: 'ti-speakerphone', bg: 'var(--c-coral-bg)', text: 'var(--c-coral-ink)' },
  docs: { label: '문서·서류', icon: 'ti-file-text', bg: 'var(--c-teal-bg)', text: 'var(--c-teal-ink)' },
  ops: { label: '운영·유통', icon: 'ti-truck', bg: 'var(--c-blue-bg)', text: 'var(--c-blue-ink)' }

const CATEGORIES = {

  progress: { label: '진행중', icon: 'ti-progress-check' },
  done: { label: '완료', icon: 'ti-circle-check' }
};
const AVATAR_COLORS = [
  { bg: 'var(--c-purple-bg)', text: 'var(--c-purple-ink)' },
  { bg: 'var(--c-coral-bg)', text: 'var(--c-coral-ink)' },
  { bg: 'var(--c-teal-bg)', text: 'var(--c-teal-ink)' },
  { bg: 'var(--c-blue-bg)', text: 'var(--c-blue-ink)' },
  { bg: 'var(--c-pink-bg)', text: 'var(--c-pink-ink)' },
  { bg: 'var(--c-amber-bg)', text: 'var(--c-amber-ink)' },
  { bg: 'var(--c-green-bg)', text: 'var(--c-green-ink)' },
  { bg: 'var(--c-red-bg)', text: 'var(--c-red-ink)' }
];

const ARCHIVE_DAYS = 3; // 완료 후 며칠 뒤 자동 보관

const DEFAULT_DATA = {
  members: [],
  projects: []
};

let state = {
  view: 'login', currentUser: null, googleUser: null, currentProject: null,
  data: null, modal: null, openDropdown: null, filter: null,
  draggingProject: null, dragOverCategory: null,
  page: 'home', // home | archive
  loginError: null,
  syncStatus: 'offline', // offline | syncing | online
  unsubscribeFirestore: null,
  isApplyingRemoteUpdate: false,
  editingNote: null // { taskId, noteId } — 현재 수정 중인 메모
};

const STORAGE_KEY = 'exoproxyl-board-data-v5';
const USER_KEY = 'exoproxyl-current-user-v5';

/* === FIRESTORE SYNC === */
let firstSnapshotReceived = false; // 첫 snap 받기 전엔 push 금지

function startFirestoreSync() {
  if (!window.firebaseReady || !window.firestoreDb) return;
  state.syncStatus = 'syncing';
  firstSnapshotReceived = false;
  console.log('[Firestore] 동기화 시작...');
  
  const docRef = window.firestoreDoc(window.firestoreDb, 'boards', window.SHARED_DOC_ID);
  state.unsubscribeFirestore = window.firestoreOnSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      const remote = snap.data();
      console.log('[Firestore] 원격 데이터 수신, 크기:', remote.payload?.length || 0);
      
      if (remote.payload) {
        // 원격 데이터를 로컬에 적용
        state.isApplyingRemoteUpdate = true;
        try {
          const remoteData = JSON.parse(remote.payload);
          state.data = remoteData;
          normalizeData();
          autoArchive();
          saveLocal();
          console.log('[Firestore] 데이터 적용 완료. 멤버:', state.data.members.length, '프로젝트:', state.data.projects.length);
        } catch (e) {
          console.error('[Firestore] 원격 데이터 파싱 실패', e);
        }
        state.isApplyingRemoteUpdate = false;
        firstSnapshotReceived = true;
        state.syncStatus = 'online';
        render();
      } else {
        // 문서는 있지만 payload가 비어있음 → 처음 사용 케이스
        console.log('[Firestore] 빈 문서 발견, 로컬 데이터를 업로드합니다');
        firstSnapshotReceived = true;
        state.syncStatus = 'online';
        // 로컬에 데이터가 있을 때만 push (빈 데이터로 덮어쓰기 방지)
        if (state.data && (state.data.members.length > 0 || state.data.projects.length > 0)) {
          pushToFirestore();
        }
        render();
      }
    } else {
      // 문서 자체가 없음 → 진짜 첫 사용
      console.log('[Firestore] 문서 없음, 첫 사용자입니다');
      firstSnapshotReceived = true;
      state.syncStatus = 'online';
      // 로컬에 데이터가 있을 때만 push
      if (state.data && (state.data.members.length > 0 || state.data.projects.length > 0)) {
        pushToFirestore();
      }
      render();
    }
  }, (err) => {
    console.error('[Firestore] sync error', err);
    state.syncStatus = 'offline';
    firstSnapshotReceived = false;
    render();
  });
}

async function pushToFirestore() {
  if (!window.firebaseReady || !window.firestoreDb) return;
  if (state.isApplyingRemoteUpdate) return;
  // 첫 snap 받기 전엔 push 금지 (다른 사람 데이터 덮어쓰기 방지)
  if (!firstSnapshotReceived) {
    console.log('[Firestore] 첫 snap 받기 전이라 push 보류');
    return;
  }
  try {
    state.syncStatus = 'syncing';
    const docRef = window.firestoreDoc(window.firestoreDb, 'boards', window.SHARED_DOC_ID);
    await window.firestoreSetDoc(docRef, {
      payload: JSON.stringify(state.data),
      updatedAt: window.firestoreServerTimestamp(),
      updatedBy: state.googleUser?.email || state.googleUser?.uid || 'unknown'
    });
    state.syncStatus = 'online';
    console.log('[Firestore] push 완료');
  } catch (e) {
    console.error('[Firestore] push error', e);
    state.syncStatus = 'offline';
  }
}

function stopFirestoreSync() {
  if (state.unsubscribeFirestore) {
    state.unsubscribeFirestore();
    state.unsubscribeFirestore = null;
  }
  firstSnapshotReceived = false;
  state.syncStatus = 'offline';
}

/* === DATA OPS === */
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); } catch (e) {}
}

function saveData() {
  saveLocal();
  pushToFirestore();
}

function normalizeData() {
  state.data.projects.forEach(p => {
    if (!p.category) p.category = 'progress';
    if (p.archived === undefined) p.archived = false;
    if (p.completedAt === undefined) p.completedAt = null;
    p.tasks.forEach(t => {
      delete t.images; // 이미지 기능 제거됨
      delete t.reviewerId; // 검토자 기능 제거됨
      // 기존 status가 'review'면 'progress'로 변환
      if (t.status === 'review') t.status = 'progress';
      if (!t.participants) t.participants = [];
      // 기존 note(string) → notes(array) 마이그레이션
      if (!t.notes) t.notes = [];
      if (t.note && typeof t.note === 'string' && t.note.trim()) {
        // 기존 단일 note가 있으면 첫 메모로 변환
        t.notes.unshift({
          id: 'n-legacy-' + t.id,
          text: t.note,
          authorId: t.assigneeId || null,
          timestamp: new Date(t.updated || Date.now()).getTime()
        });
      }
      delete t.note;
    });
  });
}

function autoArchive() {
  // 완료 카테고리 + completedAt이 3일 지난 것은 archived = true로
  const now = Date.now();
  let changed = false;
  state.data.projects.forEach(p => {
    if (p.category === 'done' && p.completedAt && !p.archived) {
      const elapsed = now - p.completedAt;
      if (elapsed >= ARCHIVE_DAYS * 24 * 60 * 60 * 1000) {
        p.archived = true;
        changed = true;
      }
    }
    // category가 done이 아닌데 completedAt이 있으면 → 다시 활성화
    if (p.category !== 'done' && p.completedAt) {
      p.completedAt = null;
      p.archived = false;
      changed = true;
    }
    // category가 done인데 completedAt이 없으면 → 지금 시점 기록
    if (p.category === 'done' && !p.completedAt) {
      p.completedAt = now;
      changed = true;
    }
  });
  return changed;
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    state.data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    normalizeData();
    if (autoArchive()) saveLocal();
  } catch {
    state.data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    normalizeData();
  }
  const savedUser = localStorage.getItem(USER_KEY);
  if (savedUser) {
    try {
      const u = JSON.parse(savedUser);
      state.currentUser = u.memberId;
      state.googleUser = u.google || null;
      state.view = 'home';
      if (window.firebaseReady && state.googleUser) startFirestoreSync();
    } catch {}
  }
}

function avatarFor(memberId) {
  if (!memberId || !state.data) return null;
  const m = state.data.members.find(x => x.id === memberId);
  if (!m) return null;
  const idx = state.data.members.indexOf(m) % AVATAR_COLORS.length;
  return { ...m, color: AVATAR_COLORS[idx] };
}

function avatarHtml(memberId, size = 24) {
  const a = avatarFor(memberId);
  if (!a) return '';
  if (state.googleUser && state.currentUser === memberId && state.googleUser.photo) {
    return `<img class="av-img" src="${state.googleUser.photo}" style="width: ${size}px; height: ${size}px;" alt="${escapeHtml(a.name)}" referrerpolicy="no-referrer" />`;
  }
  const fontSize = Math.max(10, Math.round(size * 0.42));
  return `<span class="av" style="width: ${size}px; height: ${size}px; font-size: ${fontSize}px; background: ${a.color.bg}; color: ${a.color.text};" title="${escapeHtml(a.name)}">${a.name.charAt(0)}</span>`;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

window._fbHandleLogin = async (googleData) => {
  state.loginError = null;
  console.log('[_fbHandleLogin] googleData:', googleData);
  
  // 1) 먼저 Firestore에서 최신 데이터를 받아온다 (다른 사람 데이터 덮어쓰기 방지)
  if (window.firebaseReady && window.firestoreDb) {
    console.log('[_fbHandleLogin] Firestore에서 최신 데이터 가져오는 중...');
    try {
      const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
      const docRef = window.firestoreDoc(window.firestoreDb, 'boards', window.SHARED_DOC_ID);
      const snap = await getDoc(docRef);
      if (snap.exists() && snap.data().payload) {
        const remoteData = JSON.parse(snap.data().payload);
        console.log('[_fbHandleLogin] 원격 데이터 수신. 멤버:', remoteData.members.length, '프로젝트:', remoteData.projects.length);
        state.data = remoteData;
        normalizeData();
        autoArchive();
        saveLocal();
      } else {
        console.log('[_fbHandleLogin] 원격 데이터 없음 (첫 사용자)');
      }
    } catch (e) {
      console.error('[_fbHandleLogin] 원격 데이터 가져오기 실패', e);
    }
  }
  
  // 2) 이메일로 매칭 시도
  let matched = null;
  if (googleData.email && !googleData.email.endsWith('@unknown.local')) {
    matched = state.data.members.find(m => m.email && m.email.toLowerCase() === googleData.email.toLowerCase());
  }
  
  // 3) UID로도 매칭 시도 (이메일이 없는 경우)
  if (!matched && googleData.uid) {
    matched = state.data.members.find(m => m.googleUid === googleData.uid);
  }
  
  if (matched) {
    console.log('[_fbHandleLogin] 매칭된 멤버:', matched.name);
    loginAsMember(matched.id, googleData);
    return;
  }
  
  // 4) 매칭 안 됨 → 계정 연결 모달 표시
  console.log('[_fbHandleLogin] 신규 사용자, 계정 연결 모달 표시');
  state.modal = { name: 'matchGoogle', google: googleData };
  render();
};

window._fbHandleDomainError = (email) => {

/* === NAV === */
function showProject(id) { state.view = 'project'; state.currentProject = id; render(); }
function showHome() { state.view = 'home'; state.page = 'home'; state.currentProject = null; render(); }
function showArchive() { state.view = 'home'; state.page = 'archive'; state.currentProject = null; render(); }
function setFilter(f) { state.filter = state.filter === f ? null : f; render(); }
function openModal(name, ctx = {}) { state.modal = { name, ...ctx }; render(); }
function closeModal() { state.modal = null; render(); }
function toggleDropdown(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  state.openDropdown = state.openDropdown === id ? null : id;

/* === DRAG & DROP === */
function dragStart(e, projectId) {
  state.draggingProject = projectId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', projectId);
  setTimeout(() => {
    const card = document.querySelector(`[data-project-id="${projectId}"]`);
    if (card) card.classList.add('dragging');
  }, 0);
}
function dragEnd(e) {
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  state.draggingProject = null;
  state.dragOverCategory = null;
}
function dragOver(e, category) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (state.dragOverCategory !== category) {
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const col = document.querySelector(`[data-category="${category}"]`);
    if (col) col.classList.add('drag-over');
    state.dragOverCategory = category;
  }
}
function dragLeave(e, category) {
  const col = document.querySelector(`[data-category="${category}"]`);
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}
function drop(e, category) {
  e.preventDefault();
  const projectId = e.dataTransfer.getData('text/plain') || state.draggingProject;
  if (!projectId) return;
  const project = state.data.projects.find(p => p.id === projectId);
  if (project && project.category !== category) {
    project.category = category;
    if (category === 'done') {
      project.completedAt = Date.now();
      project.archived = false;
    } else {
      project.completedAt = null;
      project.archived = false;
    }
    saveData();
  }
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  state.draggingProject = null;
  state.dragOverCategory = null;
  render();
}

/* === Task ops === */
function changeStatus(taskId, newStatus) {
  const p = state.data.projects.find(x => x.id === state.currentProject);
  const t = p.tasks.find(x => x.id === taskId);
  t.status = newStatus;
  t.updated = new Date().toISOString().split('T')[0];
  saveData(); render();
}
function setMember(taskId, field, memberId, ev) {
  if (ev) ev.stopPropagation();
  const p = state.data.projects.find(x => x.id === state.currentProject);
  const t = p.tasks.find(x => x.id === taskId);
  t[field] = memberId;
  t.updated = new Date().toISOString().split('T')[0];
  state.openDropdown = null;
  saveData(); render();
}
function toggleParticipant(taskId, memberId, ev) {
  if (ev) ev.stopPropagation();
  const p = state.data.projects.find(x => x.id === state.currentProject);
  const t = p.tasks.find(x => x.id === taskId);
  if (!t.participants) t.participants = [];
  const idx = t.participants.indexOf(memberId);
  if (idx >= 0) t.participants.splice(idx, 1);

  t.updated = new Date().toISOString().split('T')[0];

}
function deleteTask(taskId) {

}
function addTaskSubmit() {

    initialNotes.push({
      id: 'n' + now,

      authorId: state.currentUser,
      timestamp: now
    });

    id: 't' + Date.now(),

    participants: [], status: 'todo',

  });

}
function addNoteSubmit(taskId) {
  const input = document.getElementById(`note-input-${taskId}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const p = state.data.projects.find(x => x.id === state.currentProject);
  const t = p.tasks.find(x => x.id === taskId);

    authorId: state.currentUser,

  });

}
function deleteNote(taskId, noteId) {

function startEditNote(taskId, noteId) {

  setTimeout(() => {

}
function saveEditNote(taskId, noteId) {
  const ta = document.getElementById(`edit-note-${noteId}`);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) { alert('메모 내용을 입력하세요'); return; }
  const p = state.data.projects.find(x => x.id === state.currentProject);
  const t = p.tasks.find(x => x.id === taskId);

function handleEditNoteKeydown(ev, taskId, noteId) {
  if (ev.key === 'Escape') {
    ev.preventDefault();
    cancelEditNote();
  } else if (ev.key === 'Enter' && (ev.ctrlKey || ev.metaKey)) {
    // Ctrl+Enter or Cmd+Enter로 저장 (Enter만으로는 줄바꿈)
    ev.preventDefault();
    saveEditNote(taskId, noteId);
  }
}
function handleNoteKeydown(ev, taskId) {
  // Enter (Shift 없이) → 추가, Shift+Enter → 줄바꿈
  if (ev.key === 'Enter' && !ev.shiftKey) {
    ev.preventDefault();
    addNoteSubmit(taskId);
  }
}
function formatNoteTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMs / 3600000);
  const diffDay = Math.floor(diffMs / 86400000);
  if (diffMin < 1) return '방금 전';
  if (diffMin < 60) return `${diffMin}분 전`;
  if (diffHour < 24) return `${diffHour}시간 전`;
  if (diffDay < 7) return `${diffDay}일 전`;
  return `${d.getMonth() + 1}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `exoproxyl-board-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.members || !d.projects) throw new Error('잘못된 형식');
        if (!confirm('현재 데이터를 덮어쓸까요?')) return;
        state.data = d;
        normalizeData();
        autoArchive();
        saveData(); render();
        alert('가져오기 완료');
      } catch (err) { alert('파일을 읽을 수 없습니다'); }
    };
    r.readAsText(f);
  };
  input.click();
}

function progress(p) {
  if (p.tasks.length === 0) return 0;
  return Math.round((p.tasks.filter(t => t.status === 'done').length / p.tasks.length) * 100);
}
function statusBadge(status) {
  const s = STATUS[status];
  return `<span class="s ${s.cls}">${s.label}</span>`;
}
function getMyStats() {
  const userId = state.currentUser;
  const stats = { projects: new Set(), todo: 0, progress: 0, done: 0, all: [] };
  state.data.projects.filter(p => !p.archived).forEach(p => {
    p.tasks.forEach(t => {
      const isMine = t.assigneeId === userId || (t.participants || []).includes(userId);
      if (isMine || p.pmId === userId) {
        stats.projects.add(p.id);
        if (isMine) stats.all.push({ ...t, projectId: p.id, projectName: p.name });
        if (t.assigneeId === userId && t.status === 'todo') stats.todo++;
        if (t.assigneeId === userId && t.status === 'progress') stats.progress++;
        if (t.assigneeId === userId && t.status === 'done') stats.done++;
      }
    });
  });
  return { projectCount: stats.projects.size, todo: stats.todo, progress: stats.progress, done: stats.done, all: stats.all };
}
function getDeptRoster(project, deptKey) {
  const tasks = project.tasks.filter(t => t.dept === deptKey);
  const assignees = new Set();
  tasks.forEach(t => {
    if (t.assigneeId) assignees.add(t.assigneeId);
  });
  return { assignees: Array.from(assignees) };
}

/* === WEEK GROUPING === */
function getWeekStart(timestamp) {
  const d = new Date(timestamp);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // 월요일 기준
  d.setDate(diff);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}
function getWeekLabel(weekStart) {
  const now = Date.now();
  const thisWeekStart = getWeekStart(now);
  const diffWeeks = Math.round((thisWeekStart - weekStart) / (7 * 24 * 60 * 60 * 1000));
  if (diffWeeks === 0) return '이번 주';
  if (diffWeeks === 1) return '지난주';
  if (diffWeeks < 0) return `${Math.abs(diffWeeks)}주 후`;
  return `${diffWeeks}주 전`;
}
function getWeekRange(weekStart) {
  const start = new Date(weekStart);
  const end = new Date(weekStart + 6 * 24 * 60 * 60 * 1000);
  const fmt = (d) => `${d.getMonth() + 1}.${String(d.getDate()).padStart(2, '0')}`;
  return `${fmt(start)} ~ ${fmt(end)}`;
}

  const groups = {};
  archived.forEach(p => {
    const ws = getWeekStart(p.completedAt || Date.now());
    if (!groups[ws]) groups[ws] = [];
    groups[ws].push(p);
  });
  const sortedWeeks = Object.keys(groups).map(Number).sort((a, b) => b - a);

  return `

      <div class="archive-intro-title"><i class="ti ti-archive" style="font-size: 18px; vertical-align: -2px; margin-right: 6px;"></i>완료된 프로젝트 보관함</div>
      <div class="archive-intro-desc">
        완료 카테고리에 들어온 후 ${ARCHIVE_DAYS}일이 지나면 자동으로 여기로 이동합니다.<br/>
        주별로 정리되어 있으며, 클릭하면 상세 내용을 다시 볼 수 있습니다.
      </div>
    </div>

    ${archived.length === 0 ? `
      <div class="archive-empty">
        <i class="ti ti-archive-off"></i>
        <div class="archive-empty-title">아직 보관된 프로젝트가 없습니다</div>
        <div class="archive-empty-desc">완료 후 ${ARCHIVE_DAYS}일이 지나면 자동으로 여기로 이동합니다</div>
      </div>
    ` : sortedWeeks.map(ws => {
      const projects = groups[ws];
      return `
        <div class="week-section">
          <div class="week-header">
            <div>
              <span class="week-title">${getWeekLabel(ws)}</span>
              <span class="week-range">${getWeekRange(ws)}</span>
            </div>
            <span class="week-count">${projects.length}건</span>
          </div>
          <div class="archive-grid">
            ${projects.map(p => {
              const completedDate = new Date(p.completedAt);
              const dateStr = `${completedDate.getMonth() + 1}월 ${completedDate.getDate()}일`;
              return `
                <div class="archive-card" onclick="showProject('${p.id}')">
                  <div class="archive-card-name">${escapeHtml(p.name)}</div>
                  <div class="archive-card-desc">${escapeHtml(p.desc)}</div>
                  <div class="archive-card-meta">
                    <span class="archive-card-completed"><i class="ti ti-check" style="font-size: 12px;"></i> ${dateStr} 완료</span>
                    <span><i class="ti ti-list-check" style="font-size: 12px;"></i> ${p.tasks.length}건</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('')}

    <div class="info-bar">
      <i class="ti ti-info-circle"></i>
      <span>보관된 프로젝트도 클릭해서 상세 내용을 확인할 수 있습니다 · 다시 활성화하려면 상세 페이지에서 "다시 진행중으로" 버튼 사용</span>
    </div>
  `;
}

function dropdownMenu(taskId, type) {
  const project = state.data.projects.find(p => p.id === state.currentProject);
  const task = project.tasks.find(t => t.id === taskId);
  if (type === 'assignee') {
    return `
      <div class="dd-menu">
        <div class="dd-section-l">담당자 선택</div>
        <div class="dd-i" onclick="setMember('${taskId}', 'assigneeId', null, event)">
          <span class="av" style="width: 28px; height: 28px; background: var(--bg-2); color: var(--ink-3); font-size: 12px;"><i class="ti ti-x"></i></span>
          <div class="dd-i-info"><div class="dd-i-n" style="color: var(--ink-3);">미정</div></div>
        </div>
        <div class="dd-divider"></div>
        ${state.data.members.map(mem => `
          <div class="dd-i" onclick="setMember('${taskId}', 'assigneeId', '${mem.id}', event)">
            ${avatarHtml(mem.id, 28)}
            <div class="dd-i-info">
              <div class="dd-i-n">${escapeHtml(mem.name)}</div>
              <div class="dd-i-r">${escapeHtml(mem.role)}</div>
            </div>
            ${task.assigneeId === mem.id ? '<i class="ti ti-check" style="color: var(--c-green-ink);"></i>' : ''}
          </div>
        `).join('')}
      </div>`;
  }
  if (type === 'participants') {
    return `
      <div class="dd-menu">
        <div class="dd-section-l">참여자 선택 (다중)</div>
        ${state.data.members.map(mem => {
          const isSelected = (task.participants || []).includes(mem.id);
          const isAssignee = task.assigneeId === mem.id;
          const disabled = isAssignee;
          return `
            <div class="dd-i ${disabled ? 'disabled' : ''}" ${disabled ? '' : `onclick="toggleParticipant('${taskId}', '${mem.id}', event)"`}>
              ${avatarHtml(mem.id, 28)}
              <div class="dd-i-info">
                <div class="dd-i-n">${escapeHtml(mem.name)}</div>
                <div class="dd-i-r">${isAssignee ? '담당자' : escapeHtml(mem.role)}</div>
              </div>
              ${isSelected ? '<i class="ti ti-check" style="color: var(--c-green-ink);"></i>' : ''}
            </div>
          `;
        }).join('')}
      </div>`;
  }
  return '';
}

  return `
    ${renderTopbar()}

      <button class="back-btn" onclick="${isArchived ? 'showArchive()' : 'showHome()'}"><i class="ti ti-arrow-left"></i> 뒤로</button>

      <div class="detail-head">
        <div style="flex: 1; min-width: 0;">
          ${isArchived ? '<div style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: var(--bg-2); color: var(--ink-3); border-radius: 100px; font-size: 11px; font-weight: 700; margin-bottom: 12px;"><i class="ti ti-archive" style="font-size: 12px;"></i> 보관됨</div>' : ''}
          <h1 class="detail-title">${escapeHtml(p.name)}</h1>
          <p class="detail-desc">${escapeHtml(p.desc)}</p>
          <div class="detail-meta">
            <span class="detail-meta-i">PM ${avatarHtml(p.pmId, 22)} ${escapeHtml(avatarFor(p.pmId)?.name || '미정')}</span>
            <span class="detail-meta-i"><i class="ti ti-calendar"></i> 마감 ${escapeHtml(p.deadline)}</span>

                ${tasks.length === 0 ? `<div class="empty-state-box" ${!isArchived ? `onclick="openModal('addTask', { dept: '${key}' })"` : ''}>
                  ${!isArchived ? `<i class="ti ti-circle-plus" style="font-size: 24px; color: var(--ink-4); margin-bottom: 6px; display: block;"></i><div style="font-size: 13px; color: var(--ink-3); font-weight: 500;">${dept.label} 업무 추가</div><div style="font-size: 11px; color: var(--ink-4); margin-top: 2px;">클릭해서 첫 업무를 만들어보세요</div>` : '<div class="empty-state">등록된 업무가 없습니다</div>'}

                              <button class="status-btn ${t.status === 'todo' ? 'active s-todo-active' : ''}" onclick="changeStatus('${t.id}', 'todo')">

                              <button class="status-btn ${t.status === 'progress' ? 'active s-progress' : ''}" onclick="changeStatus('${t.id}', 'progress')">

                                <div class="dd" style="flex: 1; min-width: 0;">
                                  <button class="people-pick" data-dd-trigger onclick="toggleDropdown('a-${t.id}', event)">
                                    ${t.assigneeId ? `${avatarHtml(t.assigneeId, 20)}<span class="people-pick-name">${escapeHtml(avatarFor(t.assigneeId)?.name || '')}</span>` : '<span class="people-pick-empty">+ 선택</span>'}

                              </div>
                            </div>
                          </div>
                        </div>

                        ${renderNotesSection(t)}

                          <button class="tiny ghost danger-btn" onmousedown="event.stopPropagation();" onclick="event.stopPropagation(); deleteTask('${t.id}'); return false;"><i class="ti ti-trash" style="font-size: 12px;"></i> 삭제</button>

function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;
  if (m.name === 'confirm') {
    return `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal" style="max-width: 400px;">
          <div class="modal-head"><div class="modal-t">${escapeHtml(m.title || '확인')}</div></div>
          <p style="font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-bottom: 8px;">${escapeHtml(m.message || '')}</p>
          <div class="modal-actions">
            <button onclick="closeModal()">${escapeHtml(m.cancelText || '취소')}</button>
            <button class="${m.danger ? 'danger-confirm' : 'primary'}" onclick="executeConfirm()">${escapeHtml(m.confirmText || '확인')}</button>
          </div>
        </div>
      </div>`;
  }
  if (m.name === 'matchGoogle') {
    const g = m.google;
    const hasNoMembers = state.data.members.filter(mem => !mem.email).length === 0;
    return `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal" style="max-width: 460px;">
          <div class="modal-head"><div class="modal-t">${hasNoMembers ? '환영합니다!' : '계정 연결'}</div></div>
          
          <div style="display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--paper-soft); border: 1px solid var(--line); border-radius: var(--r-sm); margin-bottom: 16px;">
            ${g.photo ? `<img src="${g.photo}" referrerpolicy="no-referrer" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;" alt="${escapeHtml(g.name)}"/>` : `<div style="width: 44px; height: 44px; border-radius: 50%; background: var(--c-blue-bg); color: var(--c-blue-ink); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;">${escapeHtml((g.name || g.email || '?').charAt(0))}</div>`}
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 15px; font-weight: 700; margin-bottom: 2px;">${escapeHtml(g.name || '사용자')}</div>
              <div style="font-size: 12px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(g.email)}</div>
            </div>
          </div>
          
          <p style="margin-bottom: 18px; font-size: 13px; color: var(--ink-2); line-height: 1.6;">
            ${hasNoMembers 
              ? '이 계정으로 처음 접속하셨네요.<br/>아래 버튼을 눌러 첫 멤버로 등록해주세요.' 
              : '이 계정을 어떻게 등록할까요?<br/>기존 멤버에 연결하거나 새 멤버로 추가하세요.'}
          </p>
          
          ${!hasNoMembers ? `
            <label class="f-l">기존 멤버에 연결</label>
            <div class="member-list" style="max-height: 240px; margin-bottom: 14px;">
              ${state.data.members.filter(mem => !mem.email).map(mem => `
                <div class="m-row" style="cursor: pointer;" onclick="googleAccountToMember('${mem.id}')">
                  ${avatarHtml(mem.id, 32)}
                  <div class="m-row-info"><div class="m-row-n">${escapeHtml(mem.name)}</div><div class="m-row-r">${escapeHtml(mem.role)}</div></div>
                  <i class="ti ti-arrow-right" style="color: var(--ink-3);"></i>
                </div>
              `).join('')}
            </div>
          ` : ''}
          
          <button class="primary" style="width: 100%; padding: 13px; font-size: 14px;" onclick="googleAccountToNewMember()">
            <i class="ti ti-user-plus"></i> ${hasNoMembers ? '첫 멤버로 시작하기' : '새 멤버로 추가'}
          </button>
          
          <div class="modal-actions"><button onclick="logoutCancelMatch()">다른 계정으로 로그인</button></div>
        </div>
      </div>`;
  }
  if (m.name === 'addProject') {
    const opts = state.data.members.map(x => `<option value="${x.id}">${escapeHtml(x.name)} · ${escapeHtml(x.role)}</option>`).join('');
    const catOpts = Object.entries(CATEGORIES).map(([k, v]) => `<option value="${k}" ${k === 'progress' ? 'selected' : ''}>${v.label}</option>`).join('');
    const today = new Date(); today.setMonth(today.getMonth() + 3);
    return `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-head"><div class="modal-t">새 프로젝트</div><button class="sm icon ghost" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
          <div class="modal-form">
            <div><label class="f-l">프로젝트 이름</label><input id="new-project-name" type="text" placeholder="예: 미국 진출" autofocus /></div>
            <div><label class="f-l">한 줄 설명</label><input id="new-project-desc" type="text" placeholder="선택사항" /></div>
            <div><label class="f-l">PM</label><select id="new-project-pm">${opts}</select></div>
            <div><label class="f-l">카테고리</label><select id="new-project-category">${catOpts}</select></div>
            <div><label class="f-l">마감일</label><input id="new-project-deadline" type="date" value="${today.toISOString().split('T')[0]}" /></div>
          </div>
          <div class="modal-actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="addProjectSubmit()">만들기</button></div>
        </div>
      </div>`;
  }
  if (m.name === 'addTask') {
    const memOpts = '<option value="">미정</option>' + state.data.members.map(x => `<option value="${x.id}">${escapeHtml(x.name)} · ${escapeHtml(x.role)}</option>`).join('');
    const deptOpts = Object.entries(DEPTS).map(([k, v]) => `<option value="${k}" ${k === m.dept ? 'selected' : ''}>${v.label}</option>`).join('');
    return `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-head"><div class="modal-t">새 업무</div><button class="sm icon ghost" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
          <div class="modal-form">
            <div><label class="f-l">업무 제목</label><input id="new-task-title" type="text" placeholder="무엇을 해야 하나요?" autofocus /></div>
            <div><label class="f-l">업무 내용 (첫 메모)</label><textarea id="new-task-note" rows="4" placeholder="자세한 업무 내용, 요구사항 등을 적어주세요. 나중에 메모를 계속 추가할 수 있습니다." style="resize: vertical;"></textarea></div>
            <div class="modal-form-grid">
              <div><label class="f-l">분류</label><select id="new-task-dept">${deptOpts}</select></div>
              <div><label class="f-l">담당자</label><select id="new-task-assignee">${memOpts}</select></div>
            </div>
          </div>
          <div class="modal-actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="addTaskSubmit()">만들기</button></div>
        </div>
      </div>`;
  }
  if (m.name === 'members') {
    const deptOpts = Object.entries(DEPTS).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('');
    return `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal" style="max-width: 540px;">
          <div class="modal-head"><div class="modal-t">팀 멤버</div><button class="sm icon ghost" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
          <div class="member-list">
            ${state.data.members.map(mem => `
              <div class="m-row">
                ${avatarHtml(mem.id, 36)}
                <div class="m-row-info">
                  <div class="m-row-n">${escapeHtml(mem.name)}</div>
                  <div class="m-row-r">${escapeHtml(mem.role)} · ${DEPTS[mem.dept]?.label || mem.dept}${mem.email ? ` · ${escapeHtml(mem.email)}` : ''}</div>
                </div>
                <button class="sm icon ghost" onclick="deleteMember('${mem.id}')"><i class="ti ti-trash"></i></button>
              </div>
            `).join('')}
          </div>
          <div class="add-m">
            <label class="f-l">+ 새 멤버 추가</label>
            <div class="add-m-grid">
              <input id="new-member-name" type="text" placeholder="이름" />
              <input id="new-member-role" type="text" placeholder="직책" />
              <select id="new-member-dept" style="grid-column: span 2;">${deptOpts}</select>
              <input id="new-member-email" type="email" placeholder="@ageonbio.com 이메일" style="grid-column: span 2;" />
            </div>
            <button class="primary" style="margin-top: 12px; width: 100%;" onclick="addMemberSubmit()"><i class="ti ti-plus"></i> 추가</button>
          </div>
        </div>
      </div>`;
  }
  return '';
}

function render() {
  const app = document.getElementById('app');
  if (!state.data) {
    app.innerHTML = '<div style="padding: 4rem; text-align: center;">불러오는 중...</div>';
    return;
  }
  let main;
  if (state.view === 'login') {
    main = renderLogin();
  } else if (state.view === 'project') {
    main = `<div class="shell">${renderProject()}</div>`;
  } else {
    // home view
    if (state.page === 'archive') main = `<div class="shell">${renderArchive()}</div>`;
    else main = `<div class="shell">${renderHome()}</div>`;
  }
  app.innerHTML = main + renderModal();
}

// === 이벤트 위임 (가장 견고한 방식) ===
// 어떤 버튼이든 클래스로 찾아서 처리. render() 후에도 자동으로 작동
document.addEventListener('click', (e) => {
  // 메모 수정 버튼
  const editBtn = e.target.closest('.js-note-edit');
  if (editBtn) {
    e.stopPropagation();
    e.preventDefault();
    const taskId = editBtn.getAttribute('data-task-id');
    const noteId = editBtn.getAttribute('data-note-id');
    console.log('[메모 수정] 클릭됨', { taskId, noteId });
    startEditNote(taskId, noteId);
    return;
  }
  // 메모 삭제 버튼
  const delBtn = e.target.closest('.js-note-delete');
  if (delBtn) {
    e.stopPropagation();
    e.preventDefault();
    const taskId = delBtn.getAttribute('data-task-id');
    const noteId = delBtn.getAttribute('data-note-id');
    console.log('[메모 삭제] 클릭됨', { taskId, noteId });
    deleteNote(taskId, noteId);
    return;
  }
}, true); // capture phase로 등록 → 다른 핸들러보다 먼저 실행

document.addEventListener('mousedown', (e) => {
  // 액션 버튼이면 글로벌 mousedown 무시
  if (e.target.closest('.js-note-edit, .js-note-delete')) return;
  // 드롭다운이 열려있을 때, .dd 외부 클릭하면 닫기
  if (state.openDropdown && !e.target.closest('.dd')) {
    state.openDropdown = null;
    render();
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.modal) closeModal();
    else if (state.openDropdown) { state.openDropdown = null; render(); }
  }
});

window.googleSignIn = window.googleSignIn || (() => alert('Firebase 미설정'));

// 매 1시간마다 자동 보관 체크
setInterval(() => {
  if (autoArchive()) { saveLocal(); render(); }
}, 60 * 60 * 1000);

loadData();
render();
</script>
</body>
</html>
